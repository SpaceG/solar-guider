name: Build Windows EXE

# Baut eine eigenständige Windows-.exe mit PyInstaller.
#  - Bei einem getaggten Push (z. B. v0.1.0) wird zusätzlich ein GitHub-Release
#    erstellt und die .exe als Download angehängt.
#  - Manuell startbar über "Run workflow" (Actions-Tab); dann liegt die .exe als
#    Artifact am Lauf.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name SolarGuider
          main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolarGuider-windows
          path: dist/SolarGuider.exe
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/SolarGuider.exe "SolarGuider-${GITHUB_REF_NAME}.exe"
          gh release create "${GITHUB_REF_NAME}" "SolarGuider-${GITHUB_REF_NAME}.exe" \
            --title "${GITHUB_REF_NAME}" --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" "SolarGuider-${GITHUB_REF_NAME}.exe" --clobber
